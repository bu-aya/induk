<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Administrasi - SDIT ANNIHAYAH</title>
    
    <!-- CSS Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a', // Blue 900
                        secondary: '#3b82f6', // Blue 500
                        accent: '#10b981', // Emerald 500
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM (Locked Stable UMD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.18.6/babel.min.js"></script>
    
    <!-- Chart.js (Versi UMD 3.9.1 yang stabil) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    
    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    
    <!-- SheetJS (Excel - Locked CDNJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Loading Screen */
        #initial-loader {
            position: fixed; inset: 0; background: #fff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #1e3a8a;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="initial-loader">
        <div class="spinner"></div>
        <h2 class="mt-4 text-lg font-semibold text-gray-700">Memuat Sistem SDIT ANNIHAYAH...</h2>
    </div>
    
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- UTILITIES & MOCK DATA ---
        
        const generateId = () => Math.random().toString(36).substr(2, 9);
        
        const initialSettings = {
            classes: ['1A', '1B', '2A', '2B', '3A', '3B', '4A', '4B', '5A', '5B', '6A', '6B'],
            years: ['2019/2020', '2020/2021', '2021/2022', '2022/2023', '2023/2024', '2024/2025', '2025/2026'],
            principal: 'Ahmad, S.Pd., M.Pd.',
            dates: { rapor: '2026-06-20', transkrip: '2026-06-25', surat: '2026-06-15' },
            homeroom: {
                '1A': 'Budi, S.Pd', '1B': 'Anisa, S.Pd', '2A': 'Candra, S.Pd', '2B': 'Dewi, S.Pd',
                '3A': 'Eko, S.Pd', '3B': 'Fitri, S.Pd', '4A': 'Guntur, S.Pd', '4B': 'Hani, S.Pd',
                '5A': 'Irfan, S.Pd', '5B': 'Julia, S.Pd', '6A': 'Kurnia, S.Pd', '6B': 'Laras, S.Pd'
            }
        };

        const initialStudents = [
            { id: '1', nama: 'Ahmad Fauzi', nis: '2024001', nisn: '0123456789', ttl: 'Jakarta, 12 Mei 2012', ayah: 'Budi', ibu: 'Siti', kelas: '6A', status: 'Aktif', tahunAjaran: '2024/2025', foto: '' },
            { id: '2', nama: 'Siti Aminah', nis: '2024002', nisn: '0123456790', ttl: 'Bandung, 01 Jan 2012', ayah: 'Umar', ibu: 'Aisyah', kelas: '6B', status: 'Lulus', tahunAjaran: '2023/2024', tglLulus: '2024-06-15', noIjazah: 'DN-01/D-SD/123456', rataIjazah: '85.5' },
            { id: '3', nama: 'Budi Santoso', nis: '2024003', nisn: '0123456791', ttl: 'Bekasi, 10 Feb 2013', ayah: 'Anto', ibu: 'Ani', kelas: '5A', status: 'Mutasi Masuk', tahunAjaran: '2024/2025', tglMasuk: '2024-01-10', sekolahAsal: 'SDN 1 Bekasi', alamatAsal: 'Jl. Merdeka Bekasi' },
            { id: '4', nama: 'Dewi Lestari', nis: '2024004', nisn: '0123456792', ttl: 'Karawang, 05 Mar 2014', ayah: 'Joko', ibu: 'Rina', kelas: '4B', status: 'Mutasi Keluar', tahunAjaran: '2024/2025', tglKeluar: '2024-03-20', sekolahTujuan: 'SDN 2 Karawang', alamatTujuan: 'Jl. Pahlawan Karawang' }
        ];

        // Custom Hook for Local Storage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.log(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.log(error);
                }
            };
            return [storedValue, setValue];
        }

        // Logic Mata Pelajaran berdasarkan Tahun Ajaran
        const getSubjects = (year) => {
            if(!year) return [];
            const base = ['PAI', 'PPKN', 'B.Indo', 'MTK', 'SBDP', 'PJOK', 'B.Sunda', 'B.Inggris'];
            const startYear = parseInt(year.split('/')[0]);
            
            if (startYear >= 2024) {
                return [...base.slice(0, 4), 'IPAS', ...base.slice(4)];
            } else {
                return [...base.slice(0, 4), 'IPA', 'IPS', ...base.slice(4)];
            }
        };

        // --- ICONS (SVG) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                home: <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></>,
                settings: <><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></>,
                book: <><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></>,
                printer: <><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></>,
                mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></>,
                fileText: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></>,
                upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></>,
                search: <><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></>,
                x: <><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>,
                graduation: <><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></>,
                check: <polyline points="20 6 9 17 4 12"></polyline>,
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        // --- EXCEL & PDF UTILS ---
        const handleExportExcel = (data, filename) => {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, `${filename}.xlsx`);
        };

        // Helper untuk menghitung tahun progression dari masa sekolah SD (6 Tahun)
        const getYearProgression = (graduationYear) => {
            if (!graduationYear) return [];
            const parts = graduationYear.split('/');
            const endYear = parseInt(parts[1]);
            const progression = [];
            for (let i = 5; i >= 0; i--) {
                const start = endYear - i - 1;
                const end = endYear - i;
                progression.push(`${start}/${end}`);
            }
            return progression; 
        };

        // --- COMPONENTS ---

        // 1. Dashboard
        const Dashboard = ({ students }) => {
            const chartRef1 = useRef(null);
            const chartRef2 = useRef(null);

            const stats = useMemo(() => {
                return {
                    aktif: students.filter(s => s.status === 'Aktif').length,
                    lulus: students.filter(s => s.status === 'Lulus').length,
                    masuk: students.filter(s => s.status === 'Mutasi Masuk').length,
                    keluar: students.filter(s => s.status === 'Mutasi Keluar').length,
                }
            }, [students]);

            useEffect(() => {
                const ctx1 = document.getElementById('chart-status').getContext('2d');
                const ctx2 = document.getElementById('chart-gender').getContext('2d');
                
                if(chartRef1.current) chartRef1.current.destroy();
                if(chartRef2.current) chartRef2.current.destroy();

                chartRef1.current = new Chart(ctx1, {
                    type: 'bar',
                    data: {
                        labels: ['Aktif', 'Lulus', 'Mutasi Masuk', 'Mutasi Keluar'],
                        datasets: [{
                            label: 'Jumlah Siswa',
                            data: [stats.aktif, stats.lulus, stats.masuk, stats.keluar],
                            backgroundColor: ['#1e3a8a', '#10b981', '#f59e0b', '#ef4444'],
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                const total = students.length;
                const laki = Math.floor(total * 0.55);
                const perempuan = total - laki;

                chartRef2.current = new Chart(ctx2, {
                    type: 'doughnut',
                    data: {
                        labels: ['Laki-laki', 'Perempuan'],
                        datasets: [{
                            data: [laki, perempuan],
                            backgroundColor: ['#3b82f6', '#ec4899'],
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

            }, [stats, students]);

            return (
                <div className="space-y-6 fade-in">
                    <h1 className="text-2xl font-bold text-gray-800">Dashboard Statistik</h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white p-4 rounded-xl shadow border-l-4 border-blue-900">
                            <p className="text-sm text-gray-500 font-semibold">Total Siswa Aktif</p>
                            <p className="text-3xl font-bold text-gray-800">{stats.aktif}</p>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow border-l-4 border-green-500">
                            <p className="text-sm text-gray-500 font-semibold">Total Lulusan</p>
                            <p className="text-3xl font-bold text-gray-800">{stats.lulus}</p>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow border-l-4 border-yellow-500">
                            <p className="text-sm text-gray-500 font-semibold">Mutasi Masuk</p>
                            <p className="text-3xl font-bold text-gray-800">{stats.masuk}</p>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow border-l-4 border-red-500">
                            <p className="text-sm text-gray-500 font-semibold">Mutasi Keluar</p>
                            <p className="text-3xl font-bold text-gray-800">{stats.keluar}</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-80">
                        <div className="bg-white p-4 rounded-xl shadow flex flex-col h-full">
                            <h3 className="font-semibold text-gray-700 mb-4">Statistik Status Siswa</h3>
                            <div className="flex-grow relative"><canvas id="chart-status"></canvas></div>
                        </div>
                        <div className="bg-white p-4 rounded-xl shadow flex flex-col h-full">
                            <h3 className="font-semibold text-gray-700 mb-4">Proporsi Jenis Kelamin (Estimasi)</h3>
                            <div className="flex-grow relative"><canvas id="chart-gender"></canvas></div>
                        </div>
                    </div>
                </div>
            );
        };

        // 2. Pengelolaan Data Siswa
        const DataSiswa = ({ students, setStudents, settings, showToast }) => {
            const [search, setSearch] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [formData, setFormData] = useState({});
            
            const filteredData = students.filter(s => 
                s.nama.toLowerCase().includes(search.toLowerCase()) ||
                s.nis.includes(search) ||
                s.nisn.includes(search)
            );

            const handleSave = (e) => {
                e.preventDefault();
                if(formData.id) {
                    setStudents(students.map(s => s.id === formData.id ? formData : s));
                    showToast('Data siswa berhasil diperbarui', 'success');
                } else {
                    setStudents([...students, { ...formData, id: generateId() }]);
                    showToast('Siswa baru berhasil ditambahkan', 'success');
                }
                setShowModal(false);
            };

            const openModal = (student = null) => {
                if(student) setFormData(student);
                else setFormData({ status: 'Aktif', kelas: settings.classes[0], tahunAjaran: settings.years[settings.years.length-1] });
                setShowModal(true);
            };

            const downloadMutasi = () => {
                const mutasi = students.filter(s => s.status.includes('Mutasi'));
                handleExportExcel(mutasi, "Rekap_Mutasi_Siswa");
                showToast('Rekap mutasi berhasil diunduh', 'success');
            };

            // Impor Excel Fitur 1
            const handleExcelUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const sheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];
                        const parsedData = XLSX.utils.sheet_to_json(sheet);

                        const formatted = parsedData.map(row => ({
                            id: generateId(),
                            nama: row['Nama Lengkap'] || '',
                            nis: String(row['NIS'] || ''),
                            nisn: String(row['NISN'] || ''),
                            ttl: row['TTL (Tempat Lahir, Tgl Lahir)'] || '',
                            ayah: row['Nama Ayah'] || '',
                            ibu: row['Nama Ibu'] || '',
                            kelas: row['Kelas'] || settings.classes[0],
                            status: row['Status'] || 'Aktif',
                            tahunAjaran: row['Tahun Ajaran'] || settings.years[settings.years.length-1]
                        }));

                        setStudents([...students, ...formatted]);
                        showToast(`Berhasil mengimpor ${formatted.length} siswa`, 'success');
                    } catch (error) {
                        showToast('Gagal mengimpor file Excel. Cek format template.', 'error');
                    }
                };
                reader.readAsBinaryString(file);
            };

            const unduhTemplateSiswa = () => {
                const headers = [
                    { 'Nama Lengkap': 'Zian Almer', 'NIS': '2026112', 'NISN': '0112345678', 'TTL (Tempat Lahir, Tgl Lahir)': 'Karawang, 15 Agustus 2014', 'Nama Ayah': 'Subarjo', 'Nama Ibu': 'Suryani', 'Kelas': '6A', 'Status': 'Aktif', 'Tahun Ajaran': '2025/2026' }
                ];
                handleExportExcel(headers, "Template_Induk_Siswa");
                showToast('Template Excel berhasil diunduh', 'success');
            };

            return (
                <div className="space-y-4 fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                        <h1 className="text-2xl font-bold text-gray-800">Pengelolaan Data Siswa</h1>
                        <div className="flex flex-wrap gap-2">
                            <button onClick={unduhTemplateSiswa} className="flex items-center gap-2 bg-purple-700 text-white px-4 py-2 rounded shadow hover:bg-purple-800 transition text-sm">
                                <Icon name="download" size={16}/> Unduh Template Excel
                            </button>
                            <label className="flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded shadow hover:bg-emerald-700 transition cursor-pointer text-sm">
                                <Icon name="upload" size={16}/> Impor Excel
                                <input type="file" accept=".xlsx, .xls" onChange={handleExcelUpload} className="hidden" />
                            </label>
                            <button onClick={() => downloadMutasi()} className="flex items-center gap-2 bg-yellow-500 text-white px-4 py-2 rounded shadow hover:bg-yellow-600 transition text-sm">
                                <Icon name="download" size={16}/> Rekap Mutasi
                            </button>
                            <button onClick={() => openModal()} className="flex items-center gap-2 bg-blue-900 text-white px-4 py-2 rounded shadow hover:bg-blue-800 transition text-sm">
                                <Icon name="plus" size={16}/> Tambah Siswa
                            </button>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow">
                        <div className="flex justify-between mb-4">
                            <div className="relative w-full md:w-1/3">
                                <Icon name="search" className="absolute left-3 top-3 text-gray-400" size={18} />
                                <input type="text" placeholder="Cari Nama, NIS, NISN..." className="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-gray-100 text-gray-600 text-sm">
                                        <th className="p-3 border-b">Nama Siswa</th>
                                        <th className="p-3 border-b">NIS / NISN</th>
                                        <th className="p-3 border-b">Kelas</th>
                                        <th className="p-3 border-b">Status</th>
                                        <th className="p-3 border-b">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredData.map(s => (
                                        <tr key={s.id} className="hover:bg-gray-50 border-b text-sm">
                                            <td className="p-3 font-medium">{s.nama}</td>
                                            <td className="p-3">{s.nis} / {s.nisn}</td>
                                            <td className="p-3">{s.kelas}</td>
                                            <td className="p-3">
                                                <span className={`px-2 py-1 rounded text-xs text-white ${s.status === 'Aktif' ? 'bg-blue-500' : s.status === 'Lulus' ? 'bg-green-500' : s.status === 'Mutasi Masuk' ? 'bg-yellow-500' : 'bg-red-500'}`}>
                                                    {s.status}
                                                </span>
                                            </td>
                                            <td className="p-3">
                                                <button onClick={() => openModal(s)} className="text-blue-600 hover:underline">Edit/Detail</button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredData.length === 0 && (
                                        <tr><td colSpan="5" className="p-4 text-center text-gray-500">Tidak ada data ditemukan</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <div className="p-4 border-b flex justify-between items-center sticky top-0 bg-white">
                                    <h2 className="text-xl font-bold">{formData.id ? 'Edit Siswa' : 'Tambah Siswa'}</h2>
                                    <button onClick={() => setShowModal(false)}><Icon name="x" /></button>
                                </div>
                                <form onSubmit={handleSave} className="p-6 space-y-4">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium mb-1">Nama Lengkap</label><input required type="text" className="w-full border rounded p-2" value={formData.nama || ''} onChange={e=>setFormData({...formData, nama: e.target.value})} /></div>
                                        <div><label className="block text-sm font-medium mb-1">Status</label>
                                            <select className="w-full border rounded p-2" value={formData.status || 'Aktif'} onChange={e=>setFormData({...formData, status: e.target.value})}>
                                                <option>Aktif</option><option>Lulus</option><option>Mutasi Masuk</option><option>Mutasi Keluar</option>
                                            </select>
                                        </div>
                                        <div><label className="block text-sm font-medium mb-1">NIS</label><input required type="text" className="w-full border rounded p-2" value={formData.nis || ''} onChange={e=>setFormData({...formData, nis: e.target.value})} /></div>
                                        <div><label className="block text-sm font-medium mb-1">NISN</label><input required type="text" className="w-full border rounded p-2" value={formData.nisn || ''} onChange={e=>setFormData({...formData, nisn: e.target.value})} /></div>
                                        <div><label className="block text-sm font-medium mb-1">Tempat, Tanggal Lahir</label><input type="text" className="w-full border rounded p-2" placeholder="Karawang, 12 Mei 2012" value={formData.ttl || ''} onChange={e=>setFormData({...formData, ttl: e.target.value})} /></div>
                                        <div><label className="block text-sm font-medium mb-1">Kelas</label>
                                            <select className="w-full border rounded p-2" value={formData.kelas || ''} onChange={e=>setFormData({...formData, kelas: e.target.value})}>
                                                {settings.classes.map(c => <option key={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div><label className="block text-sm font-medium mb-1">Nama Ayah</label><input type="text" className="w-full border rounded p-2" value={formData.ayah || ''} onChange={e=>setFormData({...formData, ayah: e.target.value})} /></div>
                                        <div><label className="block text-sm font-medium mb-1">Nama Ibu</label><input type="text" className="w-full border rounded p-2" value={formData.ibu || ''} onChange={e=>setFormData({...formData, ibu: e.target.value})} /></div>
                                        <div><label className="block text-sm font-medium mb-1">Tahun Ajaran</label>
                                            <select className="w-full border rounded p-2" value={formData.tahunAjaran || ''} onChange={e=>setFormData({...formData, tahunAjaran: e.target.value})}>
                                                {settings.years.map(y => <option key={y}>{y}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Conditional Fields */}
                                    {formData.status === 'Lulus' && (
                                        <div className="bg-green-50 p-4 rounded grid grid-cols-1 md:grid-cols-3 gap-4 border border-green-200">
                                            <div><label className="block text-sm font-medium mb-1">Tanggal Lulus</label><input type="date" className="w-full border rounded p-2" value={formData.tglLulus || ''} onChange={e=>setFormData({...formData, tglLulus: e.target.value})} /></div>
                                            <div><label className="block text-sm font-medium mb-1">No. Ijazah</label><input type="text" className="w-full border rounded p-2" value={formData.noIjazah || ''} onChange={e=>setFormData({...formData, noIjazah: e.target.value})} /></div>
                                            <div><label className="block text-sm font-medium mb-1">Rata-rata Ijazah</label><input type="number" step="0.01" className="w-full border rounded p-2" value={formData.rataIjazah || ''} onChange={e=>setFormData({...formData, rataIjazah: e.target.value})} /></div>
                                        </div>
                                    )}
                                    {formData.status === 'Mutasi Masuk' && (
                                        <div className="bg-yellow-50 p-4 rounded grid grid-cols-1 md:grid-cols-3 gap-4 border border-yellow-200">
                                            <div><label className="block text-sm font-medium mb-1">Tanggal Masuk</label><input type="date" className="w-full border rounded p-2" value={formData.tglMasuk || ''} onChange={e=>setFormData({...formData, tglMasuk: e.target.value})} /></div>
                                            <div><label className="block text-sm font-medium mb-1">Sekolah Asal</label><input type="text" className="w-full border rounded p-2" value={formData.sekolahAsal || ''} onChange={e=>setFormData({...formData, sekolahAsal: e.target.value})} /></div>
                                            <div><label className="block text-sm font-medium mb-1">Alamat Asal</label><input type="text" className="w-full border rounded p-2" value={formData.alamatAsal || ''} onChange={e=>setFormData({...formData, alamatAsal: e.target.value})} /></div>
                                        </div>
                                    )}
                                    {formData.status === 'Mutasi Keluar' && (
                                        <div className="bg-red-50 p-4 rounded grid grid-cols-1 md:grid-cols-3 gap-4 border border-red-200">
                                            <div><label className="block text-sm font-medium mb-1">Tanggal Keluar</label><input type="date" className="w-full border rounded p-2" value={formData.tglKeluar || ''} onChange={e=>setFormData({...formData, tglKeluar: e.target.value})} /></div>
                                            <div><label className="block text-sm font-medium mb-1">Sekolah Tujuan</label><input type="text" className="w-full border rounded p-2" value={formData.sekolahTujuan || ''} onChange={e=>setFormData({...formData, sekolahTujuan: e.target.value})} /></div>
                                            <div><label className="block text-sm font-medium mb-1">Alamat Tujuan</label><input type="text" className="w-full border rounded p-2" value={formData.alamatTujuan || ''} onChange={e=>setFormData({...formData, alamatTujuan: e.target.value})} /></div>
                                        </div>
                                    )}

                                    <div className="flex justify-end pt-4">
                                        <button type="submit" className="bg-blue-900 text-white px-6 py-2 rounded shadow hover:bg-blue-800">Simpan Data</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 3. Input Nilai Rapor & Leger
        const NilaiRapor = ({ students, grades, setGrades, settings, showToast }) => {
            const [filter, setFilter] = useState({ tahun: settings.years[settings.years.length-1], kelas: settings.classes[0], semester: 'Ganjil' });
            
            const filteredStudents = students.filter(s => s.kelas === filter.kelas);
            const subjects = getSubjects(filter.tahun);

            const handleScoreChange = (studentId, subject, value) => {
                const updated = { ...grades };
                if (!updated[studentId]) updated[studentId] = {};
                if (!updated[studentId][filter.tahun]) updated[studentId][filter.tahun] = {};
                if (!updated[studentId][filter.tahun][filter.semester]) updated[studentId][filter.tahun][filter.semester] = {};
                
                updated[studentId][filter.tahun][filter.semester][subject] = value;
                setGrades(updated);
            };

            const getScore = (studentId, subject) => {
                return grades[studentId]?.[filter.tahun]?.[filter.semester]?.[subject] || '';
            };

            const downloadLeger = () => {
                const data = filteredStudents.map(s => {
                    const row = { Nama: s.nama, NIS: s.nis };
                    subjects.forEach(sub => row[sub] = getScore(s.id, sub));
                    return row;
                });
                handleExportExcel(data, `Leger_${filter.kelas}_${filter.tahun.replace('/','-')}_${filter.semester}`);
                showToast('Berkas Leger berhasil diunduh', 'success');
            };

            // Impor Excel Fitur 1 - Input Nilai & Leger Masal
            const handleExcelNilaiUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: 'binary' });
                        const sheetName = workbook.SheetNames[0];
                        const sheet = workbook.Sheets[sheetName];
                        const parsedData = XLSX.utils.sheet_to_json(sheet);

                        const updated = { ...grades };

                        parsedData.forEach(row => {
                            const student = students.find(s => s.nis === String(row['NIS']));
                            if (student) {
                                if (!updated[student.id]) updated[student.id] = {};
                                if (!updated[student.id][filter.tahun]) updated[student.id][filter.tahun] = {};
                                if (!updated[student.id][filter.tahun][filter.semester]) updated[student.id][filter.tahun][filter.semester] = {};

                                subjects.forEach(sub => {
                                    if (row[sub] !== undefined) {
                                        updated[student.id][filter.tahun][filter.semester][sub] = row[sub];
                                    }
                                });
                            }
                        });

                        setGrades(updated);
                        showToast(`Berhasil mengimpor nilai massal`, 'success');
                    } catch (error) {
                        showToast('Gagal mengimpor nilai dari Excel. Periksa kembali struktur tabel.', 'error');
                    }
                };
                reader.readAsBinaryString(file);
            };

            const downloadTemplateNilai = () => {
                const dataTemplate = filteredStudents.map(s => {
                    const row = { NIS: s.nis, Nama: s.nama };
                    subjects.forEach(sub => row[sub] = '');
                    return row;
                });
                handleExportExcel(dataTemplate, `Template_Nilai_${filter.kelas}_${filter.tahun.replace('/','-')}`);
                showToast('Template Nilai berhasil dibuat sesuai matpel aktif', 'success');
            };

            return (
                <div className="space-y-4 fade-in">
                    <h1 className="text-2xl font-bold text-gray-800">Input Nilai & Leger Rapor</h1>
                    
                    <div className="bg-white p-4 rounded-xl shadow flex flex-wrap gap-4 items-end">
                        <div><label className="block text-sm font-medium mb-1">Tahun Ajaran</label>
                            <select className="border rounded p-2" value={filter.tahun} onChange={e=>setFilter({...filter, tahun: e.target.value})}>
                                {settings.years.map(y => <option key={y}>{y}</option>)}
                            </select>
                        </div>
                        <div><label className="block text-sm font-medium mb-1">Kelas</label>
                            <select className="border rounded p-2" value={filter.kelas} onChange={e=>setFilter({...filter, kelas: e.target.value})}>
                                {settings.classes.map(c => <option key={c}>{c}</option>)}
                            </select>
                        </div>
                        <div><label className="block text-sm font-medium mb-1">Semester</label>
                            <select className="border rounded p-2" value={filter.semester} onChange={e=>setFilter({...filter, semester: e.target.value})}>
                                <option>Ganjil</option><option>Genap</option>
                            </select>
                        </div>
                        <div className="flex flex-wrap gap-2 ml-auto">
                            <button onClick={downloadTemplateNilai} className="bg-purple-700 text-white px-3 py-2 rounded shadow hover:bg-purple-800 flex items-center gap-1 text-sm">
                                <Icon name="download" size={14}/> Unduh Template Nilai
                            </button>
                            <label className="bg-emerald-600 text-white px-3 py-2 rounded shadow hover:bg-emerald-700 flex items-center gap-1 cursor-pointer text-sm">
                                <Icon name="upload" size={14}/> Impor Nilai Excel
                                <input type="file" accept=".xlsx, .xls" onChange={handleExcelNilaiUpload} className="hidden" />
                            </label>
                            <button onClick={downloadLeger} className="bg-blue-900 text-white px-3 py-2 rounded shadow flex items-center gap-1 hover:bg-blue-800 text-sm">
                                <Icon name="download" size={14}/> Unduh Leger Excel
                            </button>
                        </div>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow overflow-x-auto">
                        <p className="text-sm text-gray-500 mb-2">Peringatan: Matpel IPAS vs IPA/IPS otomatis menyesuaikan Tahun Ajaran.</p>
                        <table className="w-full text-left border-collapse whitespace-nowrap">
                            <thead>
                                <tr className="bg-gray-100 text-sm">
                                    <th className="p-2 border">Nama Siswa</th>
                                    {subjects.map(sub => <th key={sub} className="p-2 border text-center">{sub}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {filteredStudents.map(s => (
                                    <tr key={s.id} className="hover:bg-gray-50 text-sm">
                                        <td className="p-2 border font-medium">{s.nama}</td>
                                        {subjects.map(sub => (
                                            <td key={sub} className="p-1 border text-center">
                                                <input type="number" min="0" max="100" className="w-16 p-1 border rounded text-center" 
                                                    value={getScore(s.id, sub)} 
                                                    onChange={(e) => handleScoreChange(s.id, sub, e.target.value)}
                                                />
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                                {filteredStudents.length === 0 && <tr><td colSpan={subjects.length+1} className="p-4 text-center">Tidak ada siswa di kelas ini</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 4. Absensi & Catatan Guru
        const AbsensiCatatan = ({ students, attendance, setAttendance, notes, setNotes, settings }) => {
            const [filter, setFilter] = useState({ tahun: settings.years[settings.years.length-1], kelas: settings.classes[0], semester: 'Ganjil' });
            const filteredStudents = students.filter(s => s.kelas === filter.kelas);

            const handleChange = (type, studentId, field, value) => {
                if(type === 'absensi') {
                    const updated = { ...attendance };
                    if (!updated[studentId]) updated[studentId] = {};
                    if (!updated[studentId][filter.tahun]) updated[studentId][filter.tahun] = {};
                    if (!updated[studentId][filter.tahun][filter.semester]) updated[studentId][filter.tahun][filter.semester] = { sakit:0, izin:0, alpa:0 };
                    updated[studentId][filter.tahun][filter.semester][field] = value;
                    setAttendance(updated);
                } else {
                    const updated = { ...notes };
                    if (!updated[studentId]) updated[studentId] = {};
                    if (!updated[studentId][filter.tahun]) updated[studentId][filter.tahun] = {};
                    updated[studentId][filter.tahun][filter.semester] = value;
                    setNotes(updated);
                }
            };

            const getAtt = (id, field) => attendance[id]?.[filter.tahun]?.[filter.semester]?.[field] || '';
            const getNote = (id) => notes[id]?.[filter.tahun]?.[filter.semester] || '';

            return (
                <div className="space-y-4 fade-in">
                    <h1 className="text-2xl font-bold text-gray-800">Absensi & Catatan Guru</h1>
                    
                    <div className="bg-white p-4 rounded-xl shadow flex gap-4">
                        <select className="border rounded p-2" value={filter.tahun} onChange={e=>setFilter({...filter, tahun: e.target.value})}>{settings.years.map(y => <option key={y}>{y}</option>)}</select>
                        <select className="border rounded p-2" value={filter.kelas} onChange={e=>setFilter({...filter, kelas: e.target.value})}>{settings.classes.map(c => <option key={c}>{c}</option>)}</select>
                        <select className="border rounded p-2" value={filter.semester} onChange={e=>setFilter({...filter, semester: e.target.value})}><option>Ganjil</option><option>Genap</option></select>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-100 text-sm">
                                    <th className="p-2 border">Nama Siswa</th>
                                    <th className="p-2 border text-center">Sakit</th>
                                    <th className="p-2 border text-center">Izin</th>
                                    <th className="p-2 border text-center">Alpa</th>
                                    <th className="p-2 border">Catatan Guru (Deskripsi)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredStudents.map(s => (
                                    <tr key={s.id} className="hover:bg-gray-50 text-sm">
                                        <td className="p-2 border font-medium w-1/4">{s.nama}</td>
                                        <td className="p-1 border text-center w-16"><input type="number" className="w-12 p-1 border rounded text-center" value={getAtt(s.id, 'sakit')} onChange={e=>handleChange('absensi', s.id, 'sakit', e.target.value)}/></td>
                                        <td className="p-1 border text-center w-16"><input type="number" className="w-12 p-1 border rounded text-center" value={getAtt(s.id, 'izin')} onChange={e=>handleChange('absensi', s.id, 'izin', e.target.value)}/></td>
                                        <td className="p-1 border text-center w-16"><input type="number" className="w-12 p-1 border rounded text-center" value={getAtt(s.id, 'alpa')} onChange={e=>handleChange('absensi', s.id, 'alpa', e.target.value)}/></td>
                                        <td className="p-1 border text-center"><input type="text" className="w-full p-1 border rounded" placeholder="Pesan / Nasihat..." value={getNote(s.id)} onChange={e=>handleChange('catatan', s.id, null, e.target.value)}/></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 5. Cetak Rapor & Transkrip
        const CetakRapor = ({ students, grades, attendance, notes, settings }) => {
            const [filter, setFilter] = useState({ tahun: settings.years[settings.years.length-1], kelas: settings.classes[0], semester: 'Ganjil' });
            const filteredStudents = students.filter(s => s.kelas === filter.kelas);

            const cetakPdf = (student) => {
                const doc = new window.jspdf.jsPDF();
                const subjects = getSubjects(filter.tahun);
                const stGrades = grades[student.id]?.[filter.tahun]?.[filter.semester] || {};
                const stAtt = attendance[student.id]?.[filter.tahun]?.[filter.semester] || { sakit:0, izin:0, alpa:0 };
                const stNote = notes[student.id]?.[filter.tahun]?.[filter.semester] || "-";

                // Header
                doc.setFontSize(16); doc.setFont("helvetica", "bold");
                doc.text("RAPOR PESERTA DIDIK", 105, 20, null, null, "center");
                doc.text("SDIT ANNIHAYAH", 105, 28, null, null, "center");
                
                doc.setFontSize(11); doc.setFont("helvetica", "normal");
                doc.text(`Nama Peserta Didik : ${student.nama}`, 14, 45);
                doc.text(`NIS / NISN         : ${student.nis} / ${student.nisn}`, 14, 52);
                doc.text(`Kelas              : ${student.kelas}`, 120, 45);
                doc.text(`Semester           : ${filter.semester}`, 120, 52);
                doc.text(`Tahun Ajaran       : ${filter.tahun}`, 120, 59);

                // Table Nilai
                const tableData = subjects.map((sub, i) => [i+1, sub, stGrades[sub] || '-']);
                doc.autoTable({
                    startY: 70, head: [['No', 'Mata Pelajaran', 'Nilai']], body: tableData,
                    theme: 'grid', headStyles: { fillColor: [30, 58, 138] }
                });

                // Absensi & Catatan
                let finalY = doc.lastAutoTable.finalY + 10;
                doc.autoTable({
                    startY: finalY, head: [['Ketidakhadiran', 'Hari']],
                    body: [['Sakit', `${stAtt.sakit || 0} hari`], ['Izin', `${stAtt.izin || 0} hari`], ['Tanpa Keterangan', `${stAtt.alpa || 0} hari`]],
                    theme: 'grid', tableWidth: 80
                });

                finalY = doc.lastAutoTable.finalY + 10;
                doc.setFont("helvetica", "bold"); doc.text("Catatan Guru:", 14, finalY);
                doc.setFont("helvetica", "normal"); doc.text(stNote, 14, finalY + 6);

                // Tanda Tangan
                finalY += 30;
                doc.text(`Mengetahui,`, 14, finalY);
                doc.text(`Kepala Sekolah`, 14, finalY + 6);
                doc.text(settings.principal, 14, finalY + 25);

                doc.text(`Karawang, ${settings.dates.rapor || '...............'}`, 120, finalY);
                doc.text(`Wali Kelas`, 120, finalY + 6);
                doc.text(settings.homeroom[filter.kelas] || '(...........................)', 120, finalY + 25);

                doc.save(`Rapor_${student.nama}_${filter.semester}_${filter.tahun.replace('/','-')}.pdf`);
            };

            return (
                <div className="space-y-4 fade-in">
                    <h1 className="text-2xl font-bold text-gray-800">Cetak Rapor</h1>
                    <div className="bg-white p-4 rounded-xl shadow flex gap-4">
                        <select className="border rounded p-2" value={filter.tahun} onChange={e=>setFilter({...filter, tahun: e.target.value})}>{settings.years.map(y => <option key={y}>{y}</option>)}</select>
                        <select className="border rounded p-2" value={filter.kelas} onChange={e=>setFilter({...filter, kelas: e.target.value})}>{settings.classes.map(c => <option key={c}>{c}</option>)}</select>
                        <select className="border rounded p-2" value={filter.semester} onChange={e=>setFilter({...filter, semester: e.target.value})}><option>Ganjil</option><option>Genap</option></select>
                    </div>

                    <div className="bg-white p-4 rounded-xl shadow">
                        <table className="w-full text-left border-collapse">
                            <thead><tr className="bg-gray-100 text-sm"><th className="p-3 border-b">Nama Siswa</th><th className="p-3 border-b">Aksi</th></tr></thead>
                            <tbody>
                                {filteredStudents.map(s => (
                                    <tr key={s.id} className="hover:bg-gray-50">
                                        <td className="p-3 border-b">{s.nama}</td>
                                        <td className="p-3 border-b">
                                            <button onClick={()=>cetakPdf(s)} className="text-sm bg-red-500 text-white px-3 py-1 rounded flex items-center gap-1 hover:bg-red-600"><Icon name="printer" size={14}/> Cetak PDF</button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 6. Riwayat Alumni & Transkrip Kumulatif
        const RiwayatAlumni = ({ students, grades, settings }) => {
            const [selectedAlumni, setSelectedAlumni] = useState(null);
            const alumni = students.filter(s => s.status === 'Lulus');

            const viewProfile = (student) => setSelectedAlumni(student);

            // Fitur 2: Cetak Transkrip Alumni Kumulatif Komplet Penuh (Kelas 1 - 6)
            const cetakTranskrip = (student) => {
                const doc = new window.jspdf.jsPDF('l', 'mm', 'a4'); // Gunakan Landscape A4 agar kolom masuk semua
                
                doc.setFontSize(14); doc.setFont("helvetica", "bold");
                doc.text("TRANSKRIP REKAPITULASI NILAI KUMULATIF ALUMNI", 148, 15, null, null, "center");
                doc.setFontSize(16);
                doc.text("SDIT ANNIHAYAH", 148, 22, null, null, "center");
                
                doc.setFontSize(9); doc.setFont("helvetica", "normal");
                doc.text(`NAMA LENGKAP      : ${student.nama.toUpperCase()}`, 15, 33);
                doc.text(`NIS / NISN        : ${student.nis} / ${student.nisn}`, 15, 38);
                doc.text(`TAHUN KELULUSAN   : ${student.tahunAjaran}`, 15, 43);

                doc.text(`TANGGAL LULUS : ${student.tglLulus || '-'}`, 180, 33);
                doc.text(`NO. IJAZAH    : ${student.noIjazah || '-'}`, 180, 38);
                doc.text(`RATA-RATA     : ${student.rataIjazah || '-'}`, 180, 43);

                // List semua Mata Pelajaran gabungan kurikulum lama/baru
                const allSubjects = ['PAI', 'PPKN', 'B.Indo', 'MTK', 'IPA', 'IPS', 'IPAS', 'SBDP', 'PJOK', 'B.Sunda', 'B.Inggris'];
                const progression = getYearProgression(student.tahunAjaran);

                const tableHeaders = [
                    ['No', 'Mata Pelajaran', 'I Gj', 'I Gn', 'II Gj', 'II Gn', 'III Gj', 'III Gn', 'IV Gj', 'IV Gn', 'V Gj', 'V Gn', 'VI Gj', 'VI Gn', 'Rata']
                ];

                const tableBody = allSubjects.map((sub, idx) => {
                    const row = [idx + 1, sub];
                    let totalScore = 0;
                    let semesterCount = 0;

                    for (let c = 1; c <= 6; c++) {
                        const year = progression[c - 1];
                        ['Ganjil', 'Genap'].forEach(sem => {
                            const val = grades[student.id]?.[year]?.[sem]?.[sub];
                            if (val !== undefined && val !== '') {
                                row.push(val);
                                totalScore += Number(val);
                                semesterCount++;
                            } else {
                                row.push('-');
                            }
                        });
                    }
                    const avg = semesterCount > 0 ? (totalScore / semesterCount).toFixed(1) : '-';
                    row.push(avg);
                    return row;
                });

                doc.autoTable({
                    startY: 48,
                    head: tableHeaders,
                    body: tableBody,

                        <main className="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                            {activeTab === 'dashboard' && <Dashboard students={students} />}
                            {activeTab === 'students' && <DataSiswa students={students} setStudents={setStudents} settings={settings} showToast={showToast} />}
                            {activeTab === 'grades' && <NilaiRapor students={students} grades={grades} setGrades={setGrades} settings={settings} showToast={showToast} />}
                            {activeTab === 'attendance' && <AbsensiCatatan students={students} attendance={attendance} setAttendance={setAttendance} notes={notes} setNotes={setNotes} settings={settings} />}
                            {activeTab === 'report_cards' && <CetakRapor students={students} grades={grades} attendance={attendance} notes={notes} settings={settings} />}
                            {activeTab === 'alumni' && <RiwayatAlumni students={students} grades={grades} settings={settings} />}
                            {activeTab === 'letters' && <SuratManajemen lettersIn={lettersIn} setLettersIn={setLettersIn} lettersOut={lettersOut} setLettersOut={setLettersOut} settings={settings} showToast={showToast} />}
                            {activeTab === 'settings' && <Settings settings={settings} setSettings={setSettings} showToast={showToast} />}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
