<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Administrasi SDIT ANNIHAYAH</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .print-only { display: none; }
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* A4 Paper setup for preview */
        .paper-a4 {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .paper-a4-landscape {
            width: 297mm;
            min-height: 210mm;
            padding: 15mm;
            margin: auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- DATA AWAL (MOCK DATA) ---
        const initialSettings = {
            kepalaSekolah: "Ahmad Fauzi, S.Pd.I",
            nipKepsek: "198001012005011001",
            tglRapor: "2026-06-20",
            tglTranskrip: "2026-06-25",
            tglSurat: "2026-06-15"
        };

        const initialClasses = ["1A", "1B", "2A", "2B", "3A", "3B", "4A", "4B", "5A", "5B", "6A", "6B"];
        const initialYears = ["2022/2023", "2023/2024", "2024/2025", "2025/2026"];

        const initialStudents = [
            { id: 1, nis: "23001", nisn: "0151234567", name: "Budi Santoso", gender: "L", dob: "2015-05-12", pob: "Karawang", father: "Joko", mother: "Siti", class: "4A", status: "Aktif", year: "2025/2026" },
            { id: 2, nis: "23002", nisn: "0157654321", name: "Siti Aminah", gender: "P", dob: "2015-08-20", pob: "Karawang", father: "Asep", mother: "Nur", class: "4A", status: "Aktif", year: "2025/2026" },
            { id: 3, nis: "19001", nisn: "0121112223", name: "Andi Saputra", gender: "L", dob: "2012-01-10", pob: "Jakarta", father: "Bambang", mother: "Rina", class: "6A", status: "Lulus", year: "2023/2024", ijazahNo: "DN-02/D-SD/13/0000001", gradDate: "2024-06-15", avgScore: 88.5 },
            { id: 4, nis: "24050", nisn: "0169998887", name: "Reza Rahadian", gender: "L", dob: "2016-11-11", pob: "Bandung", father: "Rudi", mother: "Lina", class: "3B", status: "Mutasi Masuk", year: "2025/2026", entryDate: "2025-07-10", originSchool: "SDN 1 Bandung", originAddress: "Jl. Merdeka No 1" },
            { id: 5, nis: "22015", nisn: "0145556667", name: "Dina Mariana", gender: "P", dob: "2014-02-14", pob: "Karawang", father: "Doni", mother: "Ratna", class: "5A", status: "Mutasi Keluar", year: "2024/2025", exitDate: "2024-12-20", destSchool: "SDN 2 Jakarta", destAddress: "Jl. Sudirman No 5" },
        ];

        // Simulasi rekam jejak penuh untuk Andi Saputra (Lulusan)
        const initialRecords = {
            "3_2019/2020_Ganjil": { class: "1A", scores: { PAI: 85, PPKN: 80, "B.Indo": 82, MTK: 78, SBDP: 85, PJOK: 80, "B.Sunda": 80, "B.Inggris": 75, IPA: 80, IPS: 82 }, att: { sakit: 1, izin: 0, alpa: 0 }, note: "Tingkatkan belajarnya." },
            "3_2019/2020_Genap": { class: "1A", scores: { PAI: 86, PPKN: 82, "B.Indo": 84, MTK: 80, SBDP: 85, PJOK: 82, "B.Sunda": 80, "B.Inggris": 78, IPA: 82, IPS: 84 }, att: { sakit: 0, izin: 0, alpa: 0 }, note: "Ada peningkatan." },
            "3_2020/2021_Ganjil": { class: "2A", scores: { PAI: 88, PPKN: 85, "B.Indo": 85, MTK: 82, SBDP: 86, PJOK: 85, "B.Sunda": 82, "B.Inggris": 80, IPA: 85, IPS: 85 }, att: { sakit: 0, izin: 1, alpa: 0 }, note: "Pertahankan." },
            "3_2023/2024_Genap": { class: "6A", scores: { PAI: 95, PPKN: 90, "B.Indo": 88, MTK: 85, SBDP: 90, PJOK: 85, "B.Sunda": 88, "B.Inggris": 85, IPA: 90, IPS: 88 }, att: { sakit: 0, izin: 0, alpa: 0 }, note: "Sangat baik, lulus dengan baik!" },
            "1_2025/2026_Ganjil": { class: "4A", scores: { PAI: 90, PPKN: 85, "B.Indo": 88, MTK: 80, SBDP: 85, PJOK: 88, "B.Sunda": 85, "B.Inggris": 82, IPAS: 86 }, att: { sakit: 2, izin: 1, alpa: 0 }, note: "Budi anak yang rajin." }
        };

        const initialLetters = [
            { id: 1, type: 'Masuk', date: '2026-06-01', number: '015/DISDIK/VI/2026', sender: 'Dinas Pendidikan Karawang', subject: 'Undangan Rapat Kurikulum' },
            { id: 2, type: 'Keluar', date: '2026-06-05', number: '001/SDIT-AN/VI/2026', category: 'Mutasi Siswa', recipient: 'SDN 2 Jakarta', subject: 'Pengantar Mutasi an. Dina Mariana' }
        ];

        // --- HELPER FUNCTIONS ---
        const getSubjectsByYear = (year) => {
            if(!year) return [];
            const baseSubjects = ['PAI', 'PPKN', 'B.Indo', 'MTK', 'SBDP', 'PJOK', 'B.Sunda', 'B.Inggris'];
            const startYear = parseInt(year.split('/')[0]);
            if (startYear >= 2024) {
                return [...baseSubjects, 'IPAS'];
            } else {
                return [...baseSubjects, 'IPA', 'IPS'];
            }
        };

        // Daftar semua mata pelajaran yang mungkin ada untuk header transkrip
        const allPossibleSubjects = ['PAI', 'PPKN', 'B.Indo', 'MTK', 'IPA', 'IPS', 'IPAS', 'SBDP', 'PJOK', 'B.Sunda', 'B.Inggris'];

        const generatePDF = (elementId, filename, isLandscape = false) => {
            const element = document.getElementById(elementId);
            element.classList.remove('hidden', 'print-only');
            
            const opt = {
                margin:       0.5,
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: isLandscape ? 'landscape' : 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Sembunyikan kembali area print jika itu spesifik area tersembunyi
                if(element.classList.contains('print-area')) {
                    element.classList.add('hidden', 'print-only');
                }
            });
        };

        const downloadCSV = (filename, content) => {
            // Tambahkan BOM agar Excel membaca UTF-8 dengan benar
            const blob = new Blob(["\ufeff" + content], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [students, setStudents] = useState(initialStudents);
            const [classes, setClasses] = useState(initialClasses);
            const [years, setYears] = useState(initialYears);
            const [settings, setSettings] = useState(initialSettings);
            const [records, setRecords] = useState(initialRecords);
            const [letters, setLetters] = useState(initialLetters);

            // Toast/Notification state
            const [toast, setToast] = useState(null);
            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <Dashboard students={students} />;
                    case 'siswa': return <DataSiswa students={students} setStudents={setStudents} classes={classes} years={years} showToast={showToast} />;
                    case 'nilai': return <NilaiRapor students={students} classes={classes} years={years} records={records} setRecords={setRecords} showToast={showToast} />;
                    case 'alumni': return <RiwayatAlumni students={students} records={records} settings={settings} />;
                    case 'cetak': return <CetakRapor students={students} records={records} settings={settings} years={years} />;
                    case 'surat': return <Persuratan letters={letters} setLetters={setLetters} settings={settings} showToast={showToast} />;
                    case 'pengaturan': return <Pengaturan settings={settings} setSettings={setSettings} classes={classes} setClasses={setClasses} years={years} setYears={setYears} showToast={showToast} />;
                    default: return <Dashboard students={students} />;
                }
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-green-800 text-white flex flex-col shadow-xl z-10">
                        <div className="p-5 border-b border-green-700 flex items-center gap-3">
                            <div className="bg-white text-green-800 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">
                                <i className="fa-solid fa-school"></i>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight">SDIT ANNIHAYAH</h1>
                                <p className="text-xs text-green-300">Admin Panel</p>
                            </div>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-4">
                            <NavItem icon="fa-chart-pie" label="Dashboard" tab="dashboard" activeTab={activeTab} setActive={setActiveTab} />
                            <NavItem icon="fa-users" label="Data Induk Siswa" tab="siswa" activeTab={activeTab} setActive={setActiveTab} />
                            <NavItem icon="fa-book-open" label="Input Nilai & Leger" tab="nilai" activeTab={activeTab} setActive={setActiveTab} />
                            <NavItem icon="fa-print" label="Cetak Rapor" tab="cetak" activeTab={activeTab} setActive={setActiveTab} />
                            <NavItem icon="fa-graduation-cap" label="Riwayat Alumni" tab="alumni" activeTab={activeTab} setActive={setActiveTab} />
                            <NavItem icon="fa-envelope" label="Persuratan" tab="surat" activeTab={activeTab} setActive={setActiveTab} />
                            <NavItem icon="fa-cog" label="Pengaturan" tab="pengaturan" activeTab={activeTab} setActive={setActiveTab} />
                        </nav>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <header className="bg-white shadow-sm py-4 px-6 flex justify-between items-center z-10">
                            <h2 className="text-xl font-semibold text-gray-800 capitalize">
                                {activeTab === 'siswa' ? 'Data Induk Siswa' : activeTab.replace('-', ' ')}
                            </h2>
                            <div className="flex items-center gap-3">
                                <div className="text-right hidden md:block">
                                    <p className="text-sm font-bold text-gray-800">Administrator</p>
                                    <p className="text-xs text-gray-500">Tahun Ajaran Aktif: 2025/2026</p>
                                </div>
                                <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                                    <i className="fa-solid fa-user-shield"></i>
                                </div>
                            </div>
                        </header>
                        
                        <main className="flex-1 overflow-auto bg-gray-50 p-6 relative">
                            {renderContent()}
                        </main>

                        {/* Toast Notification */}
                        {toast && (
                            <div className="absolute bottom-5 right-5 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 z-50">
                                <i className="fa-solid fa-check-circle text-green-400"></i>
                                {toast}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const NavItem = ({ icon, label, tab, activeTab, setActive }) => {
            const isActive = activeTab === tab;
            return (
                <button 
                    onClick={() => setActive(tab)}
                    className={`w-full text-left px-6 py-3 flex items-center gap-3 transition-colors ${isActive ? 'bg-green-700 border-l-4 border-green-300' : 'hover:bg-green-700/50 text-green-100'}`}
                >
                    <i className={`fa-solid ${icon} w-5 text-center ${isActive ? 'text-green-300' : 'text-green-200'}`}></i>
                    <span className={isActive ? 'font-medium text-white' : ''}>{label}</span>
                </button>
            );
        };

        // --- SUB-COMPONENTS ---

        // 1. DASHBOARD
        const Dashboard = ({ students }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const stats = {
                aktif: students.filter(s => s.status === 'Aktif').length,
                lulus: students.filter(s => s.status === 'Lulus').length,
                masuk: students.filter(s => s.status === 'Mutasi Masuk').length,
                keluar: students.filter(s => s.status === 'Mutasi Keluar').length,
                l: students.filter(s => s.gender === 'L' && s.status === 'Aktif').length,
                p: students.filter(s => s.gender === 'P' && s.status === 'Aktif').length,
            };

            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Aktif (L)', 'Aktif (P)', 'Mutasi Masuk', 'Mutasi Keluar', 'Lulus'],
                        datasets: [{
                            label: 'Jumlah Siswa',
                            data: [stats.l, stats.p, stats.masuk, stats.keluar, stats.lulus],
                            backgroundColor: ['#3b82f6', '#ec4899', '#10b981', '#f59e0b', '#8b5cf6'],
                            borderWidth: 0,
                            borderRadius: 4
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }, [students]);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <StatCard title="Total Aktif" value={stats.aktif} icon="fa-users" color="bg-blue-500" />
                        <StatCard title="Laki-laki (Aktif)" value={stats.l} icon="fa-mars" color="bg-cyan-500" />
                        <StatCard title="Perempuan (Aktif)" value={stats.p} icon="fa-venus" color="bg-pink-500" />
                        <StatCard title="Mutasi Masuk" value={stats.masuk} icon="fa-user-plus" color="bg-green-500" />
                        <StatCard title="Mutasi Keluar" value={stats.keluar} icon="fa-user-minus" color="bg-orange-500" />
                        <StatCard title="Total Lulusan" value={stats.lulus} icon="fa-user-graduate" color="bg-purple-500" />
                    </div>
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-semibold text-gray-800 mb-4">Grafik Statistik Siswa</h3>
                        <div className="h-72"><canvas ref={chartRef}></canvas></div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, icon, color }) => (
            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                <div className={`w-12 h-12 rounded-lg flex items-center justify-center text-white ${color}`}><i className={`fa-solid ${icon} text-xl`}></i></div>
                <div>
                    <p className="text-gray-500 text-xs font-medium uppercase">{title}</p>
                    <p className="text-2xl font-bold text-gray-800">{value}</p>
                </div>
            </div>
        );

        // 2. DATA SISWA
        const DataSiswa = ({ students, setStudents, classes, years, showToast }) => {
            const [search, setSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('Semua');
            const [showModal, setShowModal] = useState(false);
            const [editData, setEditData] = useState(null);

            const filteredStudents = useMemo(() => {
                return students.filter(s => {
                    const matchSearch = Object.values(s).some(val => String(val).toLowerCase().includes(search.toLowerCase()));
                    const matchStatus = filterStatus === 'Semua' || s.status === filterStatus;
                    return matchSearch && matchStatus;
                });
            }, [students, search, filterStatus]);

            const handleSave = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newData = Object.fromEntries(formData.entries());
                
                if (editData) {
                    setStudents(students.map(s => s.id === editData.id ? { ...s, ...newData } : s));
                    showToast("Data siswa berhasil diperbarui");
                } else {
                    newData.id = Date.now();
                    setStudents([...students, newData]);
                    showToast("Siswa baru berhasil ditambahkan");
                }
                setShowModal(false);
            };

            const downloadRekapMutasi = () => {
                let csv = "NIS,Nama,Status,Tanggal,Asal/Tujuan Sekolah,Alamat\n";
                students.filter(s => s.status.includes('Mutasi')).forEach(s => {
                    if (s.status === 'Mutasi Masuk') {
                        csv += `${s.nis},${s.name},${s.status},${s.entryDate},${s.originSchool},${s.originAddress}\n`;
                    } else {
                        csv += `${s.nis},${s.name},${s.status},${s.exitDate},${s.destSchool},${s.destAddress}\n`;
                    }
                });
                downloadCSV("Rekap_Mutasi.csv", csv);
            };

            const handleDownloadFormat = () => {
                const header = "NIS,NISN,Nama Lengkap,Jenis Kelamin(L/P),Tempat Lahir,Tanggal Lahir(YYYY-MM-DD),Nama Ayah,Nama Ibu,Kelas,Status,Tahun Ajaran,No Ijazah(Lulus),Tgl Lulus,Nilai Rata-rata,Tgl Mutasi Masuk,Sekolah Asal,Alamat Asal,Tgl Mutasi Keluar,Sekolah Tujuan,Alamat Tujuan\n";
                const dummyData = "12345,0012345678,Siswa Contoh,L,Karawang,2015-01-01,Nama Ayah,Nama Ibu,1A,Aktif,2025/2026,,,,,,,,,,\n";
                downloadCSV("Format_Impor_Data_Siswa.csv", header + dummyData);
                showToast("Format Excel (.csv) berhasil diunduh");
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                    <div className="p-5 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex gap-2 w-full md:w-auto">
                            <div className="relative w-full md:w-64">
                                <i className="fa-solid fa-search absolute left-3 top-3 text-gray-400"></i>
                                <input type="text" placeholder="Cari Nama, NIS, NISN..." className="w-full pl-10 pr-4 py-2 border rounded-lg text-sm focus:ring-2 focus:ring-green-500 outline-none" value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <select className="border rounded-lg px-4 py-2 text-sm bg-white" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                                <option value="Semua">Semua Status</option>
                                <option value="Aktif">Aktif</option>
                                <option value="Lulus">Lulus</option>
                                <option value="Mutasi Masuk">Mutasi Masuk</option>
                                <option value="Mutasi Keluar">Mutasi Keluar</option>
                            </select>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto flex-wrap">
                            <button onClick={downloadRekapMutasi} className="px-4 py-2 bg-orange-100 text-orange-700 hover:bg-orange-200 rounded-lg text-sm font-medium transition flex items-center gap-2">
                                <i className="fa-solid fa-download"></i> Rekap Mutasi
                            </button>
                            <button onClick={handleDownloadFormat} className="px-4 py-2 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded-lg text-sm font-medium transition flex items-center gap-2">
                                <i className="fa-solid fa-file-csv"></i> Format Excel
                            </button>
                            <button onClick={() => { showToast("Fitur impor excel disimulasikan"); }} className="px-4 py-2 bg-green-100 text-green-700 hover:bg-green-200 rounded-lg text-sm font-medium transition flex items-center gap-2">
                                <i className="fa-solid fa-upload"></i> Impor
                            </button>
                            <button onClick={() => { setEditData(null); setShowModal(true); }} className="px-4 py-2 bg-green-600 text-white hover:bg-green-700 rounded-lg text-sm font-medium transition flex items-center gap-2">
                                <i className="fa-solid fa-plus"></i> Tambah Siswa
                            </button>
                        </div>
                    </div>
                    
                    <div className="overflow-x-auto flex-1">
                        <table className="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr className="bg-gray-50 border-b text-gray-600">
                                    <th className="p-4 font-medium">NIS/NISN</th>
                                    <th className="p-4 font-medium">Nama Lengkap</th>
                                    <th className="p-4 font-medium">L/P</th>
                                    <th className="p-4 font-medium">Kelas</th>
                                    <th className="p-4 font-medium">Status</th>
                                    <th className="p-4 font-medium text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredStudents.map(student => (
                                    <tr key={student.id} className="border-b hover:bg-gray-50 transition">
                                        <td className="p-4">
                                            <div className="font-semibold text-gray-800">{student.nis}</div>
                                            <div className="text-xs text-gray-500">{student.nisn}</div>
                                        </td>
                                        <td className="p-4 font-medium text-gray-800">{student.name}</td>
                                        <td className="p-4">{student.gender}</td>
                                        <td className="p-4">{student.class}</td>
                                        <td className="p-4">
                                            <span className={`px-2 py-1 rounded-full text-xs font-medium 
                                                ${student.status === 'Aktif' ? 'bg-blue-100 text-blue-700' : 
                                                  student.status === 'Lulus' ? 'bg-purple-100 text-purple-700' : 
                                                  student.status === 'Mutasi Masuk' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`}>
                                                {student.status}
                                            </span>
                                        </td>
                                        <td className="p-4 text-center">
                                            <button onClick={() => { setEditData(student); setShowModal(true); }} className="text-blue-600 hover:text-blue-800 p-2">
                                                <i className="fa-solid fa-edit"></i>
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                {filteredStudents.length === 0 && (<tr><td colSpan="6" className="p-8 text-center text-gray-500">Data tidak ditemukan</td></tr>)}
                            </tbody>
                        </table>
                    </div>

                                <div className="md:col-span-2"><label className="block text-xs font-medium text-gray-700 mb-1">Nama Lengkap</label><input required name="name" defaultValue={data?.name} className="w-full border p-2 rounded focus:ring bg-gray-50" /></div>

                                </div>

                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Tahun Ajaran</label>

        // 3. NILAI & LEGER

            const handleScoreChange = (studentId, subject, val) => {
                const key = `${studentId}_${selYear}_${selSem}`;
                const curr = records[key] || { class: selClass, scores: {}, att: { sakit: 0, izin: 0, alpa: 0 }, note: "" };
                setRecords({...records, [key]: { ...curr, scores: { ...curr.scores, [subject]: val } } });
            };
            const handleAttChange = (studentId, type, val) => {
                const key = `${studentId}_${selYear}_${selSem}`;
                const curr = records[key] || { class: selClass, scores: {}, att: { sakit: 0, izin: 0, alpa: 0 }, note: "" };
                setRecords({...records, [key]: { ...curr, att: { ...curr.att, [type]: val } } });
            };
            const handleNoteChange = (studentId, val) => {
                const key = `${studentId}_${selYear}_${selSem}`;
                const curr = records[key] || { class: selClass, scores: {}, att: { sakit: 0, izin: 0, alpa: 0 }, note: "" };
                setRecords({...records, [key]: { ...curr, note: val } });
            };

            const downloadFormatExcel = () => {
                const header = `NIS,Nama Lengkap,${subjects.join(',')},Sakit,Izin,Alpa,Catatan\n`;
                const dummyRow = `12345,Contoh Siswa,${subjects.map(()=>'80').join(',')},0,0,0,Tingkatkan terus belajarnya\n`;
                downloadCSV(`Format_Nilai_${selClass}_${selYear.replace('/','-')}_${selSem}.csv`, header + dummyRow);
                showToast(`Format Excel kelas ${selClass} berhasil diunduh`);
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                    <div className="p-5 border-b bg-gray-50 flex flex-wrap gap-4 items-center justify-between">
                        <div className="flex gap-4">
                            <div>
                                <label className="block text-xs font-semibold text-gray-600 mb-1">Kelas</label>
                                <select className="border rounded p-2 text-sm min-w-[100px]" value={selClass} onChange={e => setSelClass(e.target.value)}>
                                    {classes.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-gray-600 mb-1">Tahun Ajaran</label>

                        <div className="flex gap-2">
                            <button onClick={downloadFormatExcel} className="px-4 py-2 bg-blue-100 text-blue-700 hover:bg-blue-200 rounded text-sm font-medium transition flex items-center">

                            </button>
                            <button onClick={() => showToast("Simulasi Impor Excel Leger Berhasil")} className="px-4 py-2 bg-green-100 text-green-700 hover:bg-green-200 rounded text-sm font-medium transition flex items-center">
                                <i className="fa-solid fa-upload mr-2"></i> Impor Masal
                            </button>
                            <button onClick={() => showToast("Data nilai berhasil disimpan")} className="px-4 py-2 bg-blue-600 text-white hover:bg-blue-700 rounded text-sm font-medium transition flex items-center">

                            </button>
                        </div>
                    </div>

                    <div className="overflow-x-auto flex-1 p-4">
                        <table className="w-full text-left border-collapse text-sm whitespace-nowrap">
                            <thead>
                                <tr className="bg-gray-800 text-white">
                                    <th className="p-2 border border-gray-700 sticky left-0 z-10 bg-gray-800 w-64">Nama Siswa</th>
                                    <th colSpan={subjects.length} className="p-2 border border-gray-700 text-center">Mata Pelajaran</th>
                                    <th colSpan="3" className="p-2 border border-gray-700 text-center bg-orange-700">Absensi</th>
                                    <th className="p-2 border border-gray-700 text-center bg-blue-700 min-w-[200px]">Catatan Guru</th>
                                </tr>
                                <tr className="bg-gray-100 text-gray-700 text-xs">
                                    <th className="p-2 border sticky left-0 z-10 bg-gray-200">NIS</th>
                                    {subjects.map(sub => <th key={sub} className="p-2 border text-center w-16">{sub}</th>)}

                                    <th className="p-2 border text-center w-12 bg-orange-50">I</th>
                                    <th className="p-2 border text-center w-12 bg-orange-50">A</th>
                                    <th className="p-2 border bg-blue-50">Deskripsi</th>
                                </tr>
                            </thead>
                            <tbody>

                                    const rec = records[`${student.id}_${selYear}_${selSem}`] || { scores: {}, att: {} };
                                    return (
                                        <tr key={student.id} className="hover:bg-yellow-50">
                                            <td className="p-2 border sticky left-0 z-10 bg-white font-medium text-gray-800 truncate max-w-[200px]" title={student.name}>
                                                {student.name} <br/><span className="text-[10px] text-gray-400 font-normal">{student.nis}</span>
                                            </td>
                                            {subjects.map(sub => (
                                                <td key={sub} className="p-1 border">
                                                    <input type="number" min="0" max="100" className="w-full p-1 text-center border-0 bg-transparent focus:ring-2 focus:ring-blue-500 rounded"

        // 4. RIWAYAT ALUMNI
        const RiwayatAlumni = ({ students, records, settings }) => {
            const alumni = students.filter(s => s.status === 'Lulus');
            const [selAlumniId, setSelAlumniId] = useState(alumni.length > 0 ? alumni[0].id : null);

            const student = alumni.find(s => s.id === parseInt(selAlumniId));

            // Tabel Transkrip Komprehensif
            const renderRekamJejakLengkap = () => {
                if (!student) return null;
                
                // Susun kerangka 12 semester
                const semesters = [];
                for(let grade = 1; grade <= 6; grade++) {
                    semesters.push({ grade, sem: 'Ganjil', label: `Kls ${grade} (G)` });
                    semesters.push({ grade, sem: 'Genap', label: `Kls ${grade} (Gn)` });
                }

                // Cari data berdasarkan studentId
                const studentRecords = Object.keys(records)
                    .filter(key => key.startsWith(`${student.id}_`))
                    .map(key => {
                        const [id, year, sem] = key.split('_');
                        const data = records[key];
                        // Ekstrak angka kelas dari string "1A", "2B", dll
                        const grade = parseInt(data.class.match(/\d+/)?.[0] || "0");
                        return { grade, sem, data };
                    });

                return (
                    <div className="mt-8 border-t pt-6" id="transkrip-table-container">
                        <h4 className="font-bold text-gray-800 text-center uppercase mb-4 text-lg">Transkrip Nilai Akademik Lengkap</h4>
                        <table className="w-full text-xs border-collapse border border-black text-center">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="border border-black p-2 align-middle w-32" rowSpan="2">Mata Pelajaran</th>
                                    <th className="border border-black p-1" colSpan="2">Kelas 1</th>
                                    <th className="border border-black p-1" colSpan="2">Kelas 2</th>
                                    <th className="border border-black p-1" colSpan="2">Kelas 3</th>
                                    <th className="border border-black p-1" colSpan="2">Kelas 4</th>
                                    <th className="border border-black p-1" colSpan="2">Kelas 5</th>
                                    <th className="border border-black p-1" colSpan="2">Kelas 6</th>
                                </tr>
                                <tr className="bg-gray-50">
                                    {[...Array(6)].map((_, i) => (
                                        <React.Fragment key={i}>
                                            <th className="border border-black p-1 font-normal">Ganjil</th>
                                            <th className="border border-black p-1 font-normal">Genap</th>
                                        </React.Fragment>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {allPossibleSubjects.map(sub => (
                                    <tr key={sub}>
                                        <td className="border border-black p-2 text-left font-medium">{sub}</td>
                                        {semesters.map((sCol, idx) => {
                                            // Cari apakah ada rekor di kelas & semester ini
                                            const rec = studentRecords.find(r => r.grade === sCol.grade && r.sem === sCol.sem);
                                            const score = rec?.data?.scores?.[sub];
                                            return (
                                                <td key={idx} className="border border-black p-1 text-center">
                                                    {score ? score : '-'}
                                                </td>
                                            );
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                );
            };

            return (
                <div className="flex flex-col md:flex-row gap-6 h-full">

                        <h3 className="font-bold text-gray-800 mb-4">Daftar Alumni</h3>
                        <div className="space-y-2">
                            {alumni.map(a => (
                                <div key={a.id} onClick={() => setSelAlumniId(a.id)} 
                                    className={`p-3 rounded-lg cursor-pointer border transition ${selAlumniId === a.id ? 'bg-purple-50 border-purple-300' : 'hover:bg-gray-50 border-transparent'}`}>
                                    <p className="font-bold text-gray-800">{a.name}</p>
                                    <p className="text-xs text-gray-500">Lulus: {a.year} • NISN: {a.nisn}</p>
                                </div>
                            ))}

                        </div>
                    </div>
                    
                    <div className="w-full md:w-2/3 flex flex-col gap-4 overflow-y-auto pb-10">

                                        <i className="fa-solid fa-file-pdf mr-2"></i> Cetak Transkrip (Landscape)
                                    </button>
                                </div>
                                <div className="bg-white p-8 shadow-sm border border-gray-200 relative overflow-hidden text-black" id="print-alumni">

                                        <h2 className="text-lg font-bold">SDIT ANNIHAYAH</h2>

                                            <p><span className="font-semibold w-32 inline-block">Rata-rata Ijazah</span>: <span className="font-bold">{student.avgScore}</span></p>

                                        <p className="font-bold underline">{settings.kepalaSekolah}</p>
                                        <p>NIP. {settings.nipKepsek}</p>
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div className="flex-1 bg-white flex items-center justify-center rounded-xl shadow-sm text-gray-400">
                                Pilih alumni untuk melihat rekam jejak.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 5. CETAK RAPOR
        const CetakRapor = ({ students, records, settings, years }) => {
            const [selStudent, setSelStudent] = useState('');
            const [selYear, setSelYear] = useState(years[years.length-1]);
            const [selSem, setSelSem] = useState('Ganjil');

            const student = students.find(s => s.id === parseInt(selStudent));
            const record = student ? records[`${student.id}_${selYear}_${selSem}`] : null;

                                {years.map(y => <option key={y} value={y}>{y}</option>)}
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-semibold text-gray-600 mb-1">Semester</label>
                            <select className="w-full border rounded p-2 text-sm" value={selSem} onChange={e => setSelSem(e.target.value)}>
                                <option value="Ganjil">Ganjil</option><option value="Genap">Genap</option>
                            </select>
                        </div>
                        <button onClick={() => {if(student && record) generatePDF('rapor-print', `Rapor_${student.name}_${selSem}.pdf`);}} 
                            disabled={!student || !record}
                            className="px-6 py-2 bg-blue-600 text-white rounded text-sm font-medium shadow hover:bg-blue-700 disabled:bg-gray-300">
                            <i className="fa-solid fa-print mr-2"></i> Cetak Rapor PDF
                        </button>
                    </div>

                    {student && record ? (
                        <div id="rapor-print" className="bg-white p-8 shadow border max-w-4xl mx-auto text-black print-area">
                            <div className="text-center border-b-4 border-black pb-4 mb-6">
                                <h1 className="text-2xl font-bold uppercase">Laporan Hasil Belajar Siswa</h1>
                                <h2 className="text-xl font-bold">SDIT ANNIHAYAH</h2>
                                <p className="text-sm">Jl. Pendidikan No. 123, Karawang Barat, Jawa Barat</p>
                            </div>
                            
                            <div className="flex justify-between text-sm mb-6 font-semibold">
                                <div>
                                    <p>Nama Siswa : {student.name}</p>
                                    <p>NIS / NISN : {student.nis} / {student.nisn}</p>
                                </div>
                                <div>
                                    <p>Kelas : {record.class}</p>
                                    <p>Semester : {selSem}</p>
                                    <p>Tahun Ajaran: {selYear}</p>
                                </div>
                            </div>

                            <table className="w-full border-collapse border border-black text-sm mb-6">
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="border border-black p-2 w-10 text-center">No</th>
                                        <th className="border border-black p-2">Mata Pelajaran</th>
                                        <th className="border border-black p-2 w-24 text-center">Nilai</th>
                                        <th className="border border-black p-2 w-48 text-center">Predikat</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {subjects.map((sub, idx) => {
                                        const score = record.scores[sub] || 0;
                                        const predikat = score >= 90 ? 'A (Sangat Baik)' : score >= 80 ? 'B (Baik)' : score >= 70 ? 'C (Cukup)' : 'D (Kurang)';
                                        return (
                                            <tr key={sub}>
                                                <td className="border border-black p-2 text-center">{idx + 1}</td>
                                                <td className="border border-black p-2">{sub}</td>
                                                <td className="border border-black p-2 text-center font-bold">{score}</td>
                                                <td className="border border-black p-2 text-center text-xs">{predikat}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>

                            <div className="flex gap-6 mb-6">
                                <div className="w-1/3">
                                    <table className="w-full border-collapse border border-black text-sm">
                                        <thead><tr className="bg-gray-100"><th colSpan="2" className="border border-black p-2">Ketidakhadiran</th></tr></thead>
                                        <tbody>
                                            <tr><td className="border border-black p-2">Sakit</td><td className="border border-black p-2 text-center">{record.att?.sakit || 0} hari</td></tr>
                                            <tr><td className="border border-black p-2">Izin</td><td className="border border-black p-2 text-center">{record.att?.izin || 0} hari</td></tr>
                                            <tr><td className="border border-black p-2">Tanpa Keterangan</td><td className="border border-black p-2 text-center">{record.att?.alpa || 0} hari</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                                <div className="flex-1 border border-black p-4 text-sm">
                                    <p className="font-bold mb-2">Catatan Wali Kelas:</p>
                                    <p className="italic">"{record.note || '-'}"</p>
                                </div>
                            </div>

                            <div className="flex justify-between text-sm mt-12 px-8">
                                <div className="text-center">
                                    <p>Mengetahui,</p>
                                    <p>Orang Tua/Wali</p>
                                    <br/><br/><br/>
                                    <p className="border-b border-black w-32 mx-auto"></p>
                                </div>
                                <div className="text-center">
                                    <p>Karawang, {settings.tglRapor}</p>
                                    <p>Wali Kelas {record.class}</p>
                                    <br/><br/><br/>
                                    <p className="font-bold underline text-center w-40 mx-auto"></p>
                                </div>
                            </div>
                            <div className="text-center text-sm mt-8">
                                <p>Mengetahui,</p>
                                <p>Kepala Sekolah SDIT Annihayah</p>
                                <br/><br/><br/>
                                <p className="font-bold underline">{settings.kepalaSekolah}</p>
                                <p>NIP. {settings.nipKepsek}</p>
                            </div>
                        </div>
                    ) : (
                        student ? 
                        <div className="bg-yellow-50 p-6 rounded text-yellow-800 text-center border border-yellow-200">Data nilai untuk semester dan tahun ajaran ini belum diinput.</div> :
                        <div className="bg-gray-50 p-12 text-center text-gray-400 border rounded-xl">Silakan pilih siswa untuk melihat preview rapor.</div>
                    )}
                </div>
            );
        };

        // 6. PERSURATAN
        const Persuratan = ({ letters, setLetters, settings, showToast }) => {
            const [tab, setTab] = useState('Keluar');
            const [showModal, setShowModal] = useState(false);
            const [previewSurat, setPreviewSurat] = useState(null);

            const generateSuratNumber = () => {
                const outLetters = letters.filter(l => l.type === 'Keluar');
                const count = outLetters.length + 1;
                const d = new Date();
                const romanMonths = ["I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII"];
                return `${String(count).padStart(3, '0')}/SDIT-AN/${romanMonths[d.getMonth()]}/${d.getFullYear()}`;
            };

            const handleSave = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newData = Object.fromEntries(formData.entries());
                newData.id = Date.now();
                newData.type = tab;
                if (tab === 'Keluar' && !newData.number) {
                    newData.number = generateSuratNumber();
                }
                setLetters([newData, ...letters]);
                setShowModal(false);
                showToast("Data surat berhasil disimpan");
            };

            const handlePrintPreview = () => {
                generatePDF('surat-preview-print', `Surat_${previewSurat.number.replace(/\//g, '_')}.pdf`);
                showToast("Surat sedang diunduh...");
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-full">
                    <div className="flex border-b">
                        <button className={`flex-1 py-4 font-medium text-center ${tab === 'Keluar' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-50'}`} onClick={() => setTab('Keluar')}>Surat Keluar</button>
                        <button className={`flex-1 py-4 font-medium text-center ${tab === 'Masuk' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-gray-500 hover:bg-gray-50'}`} onClick={() => setTab('Masuk')}>Surat Masuk</button>
                    </div>
                    
                    <div className="p-5 flex justify-between items-center bg-gray-50">
                        <h3 className="font-semibold text-gray-700">Daftar Surat {tab}</h3>
                        <button onClick={() => setShowModal(true)} className="px-4 py-2 bg-blue-600 text-white rounded shadow text-sm font-medium hover:bg-blue-700">
                            <i className="fa-solid fa-plus mr-2"></i> Tambah Surat {tab}
                        </button>
                    </div>

                    <div className="overflow-x-auto p-4 flex-1">
                        <table className="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr className="bg-gray-100">
                                    <th className="p-3 border-b font-medium">Tanggal</th>
                                    <th className="p-3 border-b font-medium">Nomor Surat</th>
                                    <th className="p-3 border-b font-medium">{tab === 'Masuk' ? 'Pengirim' : 'Kategori'}</th>
                                    <th className="p-3 border-b font-medium">Perihal</th>
                                    <th className="p-3 border-b font-medium text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {letters.filter(l => l.type === tab).map(l => (
                                    <tr key={l.id} className="border-b hover:bg-gray-50">
                                        <td className="p-3">{l.date}</td>
                                        <td className="p-3 font-medium text-blue-700">{l.number}</td>
                                        <td className="p-3">{tab === 'Masuk' ? l.sender : l.category}</td>
                                        <td className="p-3">{l.subject}</td>
                                        <td className="p-3 text-center">
                                            {tab === 'Keluar' && (
                                                <button onClick={() => setPreviewSurat(l)} className="text-blue-600 hover:bg-blue-50 p-2 rounded" title="Preview Surat">
                                                    <i className="fa-solid fa-eye"></i> View
                                                </button>
                                            )}
                                            {tab === 'Masuk' && (
                                                <button onClick={() => showToast("Membuka file scan surat...")} className="text-gray-600 hover:bg-gray-200 p-2 rounded" title="Lihat Scan">
                                                    <i className="fa-solid fa-paperclip"></i>
                                                </button>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* MODAL PREVIEW SURAT */}
                    {previewSurat && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 py-10">
                            <div className="bg-gray-200 rounded-xl shadow-2xl w-full max-w-4xl h-full flex flex-col overflow-hidden">
                                <div className="px-6 py-4 bg-white border-b flex justify-between items-center shadow-sm z-10">
                                    <h3 className="font-bold text-gray-800"><i className="fa-solid fa-file-lines mr-2"></i> Preview Surat Keluar</h3>
                                    <div className="flex gap-2">
                                        <button onClick={handlePrintPreview} className="px-4 py-2 bg-red-600 text-white rounded text-sm font-medium shadow hover:bg-red-700 transition">
                                            <i className="fa-solid fa-file-pdf mr-2"></i> Download PDF
                                        </button>
                                        <button onClick={() => setPreviewSurat(null)} className="px-4 py-2 border rounded text-gray-600 hover:bg-gray-100 font-medium">Tutup</button>
                                    </div>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1 bg-gray-300">
                                    {/* Kertas A4 Preview */}
                                    <div id="surat-preview-print" className="paper-a4 text-black text-sm">
                                        <div className="text-center border-b-2 border-black pb-4 mb-6">
                                            <h1 className="text-xl font-bold uppercase tracking-widest">YAYASAN PENDIDIKAN ISLAM ANNIHAYAH</h1>
                                            <h2 className="text-2xl font-bold uppercase">SDIT ANNIHAYAH</h2>
                                            <p className="text-xs">Terakreditasi "A" - NPSN: 12345678</p>
                                            <p className="text-xs">Jl. Pendidikan No. 123, Karawang Barat, Jawa Barat 41311</p>
                                        </div>
                                        
                                        <div className="flex justify-between items-start mb-8">
                                            <table className="text-sm">
                                                <tbody>
                                                    <tr><td className="w-20">Nomor</td><td>: {previewSurat.number}</td></tr>
                                                    <tr><td>Lampiran</td><td>: -</td></tr>
                                                    <tr><td>Perihal</td><td>: <span className="font-bold">{previewSurat.subject}</span></td></tr>
                                                </tbody>
                                            </table>
                                            <div className="text-right">
                                                Karawang, {previewSurat.date}
                                            </div>
                                        </div>

                                        <div className="mb-6">
                                            <p>Kepada Yth.,</p>
                                            <p className="font-bold">{previewSurat.recipient}</p>
                                            <p>di Tempat</p>
                                        </div>

                                        <div className="text-justify leading-relaxed mb-10 min-h-[200px]">
                                            <p className="mb-4"><i>Assalamu'alaikum Warahmatullahi Wabarakatuh,</i></p>
                                            <p className="mb-4 indent-8">
                                                Dengan hormat, melalui surat ini kami dari pihak SDIT Annihayah memberitahukan hal-hal terkait dengan <b>{previewSurat.category}</b>.
                                                Surat ini diterbitkan sebagai pengantar/keterangan resmi dari sekolah kami yang ditujukan kepada instansi yang Bapak/Ibu pimpin.
                                            </p>
                                            <p className="indent-8">
                                                Demikian surat ini kami sampaikan, atas perhatian dan kerjasama Bapak/Ibu, kami ucapkan terima kasih.</p>
                                            <p className="mt-4"><i>Wassalamu'alaikum Warahmatullahi Wabarakatuh.</i></p>
                                        </div>

                                        <div className="text-right mt-16 pr-8">
                                            <p>Kepala SDIT Annihayah,</p>
                                            <br/><br/><br/><br/>
                                            <p className="font-bold underline">{settings.kepalaSekolah}</p>
                                            <p>NIP. {settings.nipKepsek}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL TAMBAH SURAT */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
                                <div className="px-6 py-4 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-gray-800">Tambah Surat {tab}</h3>
                                    <button onClick={() => setShowModal(false)}><i className="fa-solid fa-times"></i></button>
                                </div>
                                <div className="p-6">
                                    <form id="suratForm" onSubmit={handleSave} className="space-y-4">
                                        <div><label className="block text-xs font-medium text-gray-700 mb-1">Tanggal</label><input type="date" name="date" required className="w-full border p-2 rounded" /></div>
                                        
                                        {tab === 'Masuk' ? (
                                            <>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Nomor Surat (dari Pengirim)</label><input type="text" name="number" required className="w-full border p-2 rounded" /></div>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Instansi/Pengirim</label><input type="text" name="sender" required className="w-full border p-2 rounded" /></div>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Perihal</label><input type="text" name="subject" required className="w-full border p-2 rounded" /></div>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Upload Scan (PDF/JPG)</label><input type="file" className="w-full border p-2 rounded text-sm" /></div>
                                            </>
                                        ) : (
                                            <>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Kategori Surat</label>
                                                    <select name="category" className="w-full border p-2 rounded">
                                                        <option>Surat Mutasi Siswa</option>
                                                        <option>Surat Keterangan Aktif</option>
                                                        <option>Surat Kelakuan Baik</option>
                                                        <option>Surat Kelulusan</option>
                                                        <option>Surat Undangan</option>
                                                        <option>Surat Dinas</option>
                                                    </select>
                                                </div>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Nomor Surat (Otomatis)</label><input type="text" readOnly placeholder="Otomatis (Misal: 002/SDIT-AN/VI/2026)" className="w-full border p-2 rounded bg-gray-100" /></div>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Tujuan / Penerima</label><input type="text" name="recipient" required className="w-full border p-2 rounded" /></div>
                                                <div><label className="block text-xs font-medium text-gray-700 mb-1">Perihal</label><input type="text" name="subject" required className="w-full border p-2 rounded" /></div>
                                            </>
                                        )}
                                    </form>
                                </div>
                                <div className="px-6 py-4 border-t bg-gray-50 flex justify-end gap-2">
                                    <button type="button" onClick={() => setShowModal(false)} className="px-4 py-2 border rounded font-medium text-gray-600">Batal</button>
                                    <button type="submit" form="suratForm" className="px-4 py-2 bg-blue-600 text-white rounded font-medium">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 7. PENGATURAN
        const Pengaturan = ({ settings, setSettings, classes, setClasses, years, setYears, showToast }) => {
            const handleSettingChange = (e) => setSettings({...settings, [e.target.name]: e.target.value});
            
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 h-full overflow-y-auto pb-10">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Informasi Sekolah</h3>
                        <div className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Nama Kepala Sekolah</label><input name="kepalaSekolah" value={settings.kepalaSekolah} onChange={handleSettingChange} className="w-full border p-2 rounded" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">NIP Kepala Sekolah</label><input name="nipKepsek" value={settings.nipKepsek} onChange={handleSettingChange} className="w-full border p-2 rounded" /></div>
                        </div>
                    </div>
                    
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Tanggal Cetak Dokumen (Default)</h3>
                        <div className="space-y-4">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Cetak Rapor</label><input type="date" name="tglRapor" value={settings.tglRapor} onChange={handleSettingChange} className="w-full border p-2 rounded" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Cetak Transkrip</label><input type="date" name="tglTranskrip" value={settings.tglTranskrip} onChange={handleSettingChange} className="w-full border p-2 rounded" /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Surat Keluar</label><input type="date" name="tglSurat" value={settings.tglSurat} onChange={handleSettingChange} className="w-full border p-2 rounded" /></div>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 md:col-span-2 flex justify-end">
                        <button onClick={() => showToast("Pengaturan berhasil disimpan")} className="px-6 py-2 bg-green-600 text-white rounded-lg shadow hover:bg-green-700 font-medium">Simpan Perubahan</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
