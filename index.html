            const [isAuthenticated, setIsAuthenticated] = useState(true);
            const [currentUser, setCurrentUser] = useState({ username: "admin", role: "admin" });
            const [loginError, setLoginError] = useState("");
            const [activeTab, setActiveTab] = useState("dashboard");

            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem("sdit_annihayah_students")) || initialStudents);
            const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem("sdit_annihayah_settings")) || initialSettings);

            const [cptpSettings, setCptpSettings] = useState(() => JSON.parse(localStorage.getItem("sdit_annihayah_cptp")) || initialCptp);

            // Custom UI Notification alerts
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });
            const [confirmDialog, setConfirmDialog] = useState({ show: false, title: "", message: "", onConfirm: null });

            const [searchQuery, setSearchQuery] = useState("");
            const [filterClass, setFilterClass] = useState("Semua");
            const [filterStatus, setFilterStatus] = useState("Semua");
            const [sortField, setSortField] = useState("name");
            const [sortDirection, setSortDirection] = useState("asc");
            const [selectedGradeCptp, setSelectedGradeCptp] = useState("6");

            // Modal & Form States
            const [studentModalOpen, setStudentModalOpen] = useState(false);
            const [currentStudentEdit, setCurrentStudentEdit] = useState(null);
            const [studentForm, setStudentForm] = useState({
                id: "", name: "", nis: "", nisn: "", pob: "", dob: "", gender: "Laki-laki",
                currentClass: "Kelas 6A", status: "Aktif", academicYear: "2025/2026", photo: "",
                mutationInDate: "", originSchool: "", originSchoolAddress: "",
                mutationOutDate: "", targetSchool: "", targetSchoolAddress: "",
                graduationNo: "", graduationDate: "", graduationAvg: ""
            });

            // Input Nilai State
            const [gradeClass, setGradeClass] = useState("Kelas 6A");
            const [gradeYear, setGradeYear] = useState("2025/2026");
            const [gradeSemester, setGradeSemester] = useState("Ganjil");
            const [bulkGrades, setBulkGrades] = useState({});

            // Selected IDs for Reports & Transcripts
            const [selectedStudentId, setSelectedStudentId] = useState("");
            const [alumniViewId, setAlumniViewId] = useState("");
            const [selectedAlumniTranscriptId, setSelectedAlumniTranscriptId] = useState("");
            const [importExportText, setImportExportText] = useState("");

            useEffect(() => {
                localStorage.setItem("sdit_annihayah_students", JSON.stringify(students));
                localStorage.setItem("sdit_annihayah_settings", JSON.stringify(settings));
                localStorage.setItem("sdit_annihayah_academic_records", JSON.stringify(academicRecords));
                localStorage.setItem("sdit_annihayah_cptp", JSON.stringify(cptpSettings));
            }, [students, settings, academicRecords, cptpSettings]);

            // Helper to show custom toasts
            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3500);
            };

            // Custom Confirm Helper
            const triggerConfirm = (title, message, callback) => {
                setConfirmDialog({ show: true, title, message, onConfirm: () => {
                    callback();
                    setConfirmDialog(prev => ({ ...prev, show: false }));
                }});
            };

            const getSubjectsForYear = (year) => {
                const isKurikulumMerdeka = ["2024/2025", "2025/2026"].includes(year);
                const base = [
                    { code: "PAI", name: "Pendidikan Agama Islam" },
                    { code: "PPKN", name: "PPKn" },
                    { code: "B.Indo", name: "Bahasa Indonesia" },
                    { code: "MTK", name: "Matematika" }
                ];
                if (isKurikulumMerdeka) {
                    base.push({ code: "IPAS", name: "IPAS" });
                } else {
                    base.push({ code: "IPA", name: "IPA" }, { code: "IPS", name: "IPS" });
                }
                base.push(
                    { code: "SBDP", name: "SBdP" },
                    { code: "PJOK", name: "PJOK" },
                    { code: "B.Sunda", name: "Bahasa Sunda" },
                    { code: "B.Inggris", name: "Bahasa Inggris" }
                );
                return base;
            };

            // Unified full subject list for cumulative transcript matrix
            const getAllPossibleSubjects = () => {
                return [
                    { code: "PAI", name: "Pendidikan Agama Islam" },
                    { code: "PPKN", name: "PPKn" },
                    { code: "B.Indo", name: "Bahasa Indonesia" },
                    { code: "MTK", name: "Matematika" },
                    { code: "IPA", name: "Sains (IPA)" },
                    { code: "IPS", name: "Sosial (IPS)" },
                    { code: "IPAS", name: "IPAS (Merdeka)" },
                    { code: "SBDP", name: "SBdP" },
                    { code: "PJOK", name: "PJOK" },
                    { code: "B.Sunda", name: "Bahasa Sunda" },
                    { code: "B.Inggris", name: "Bahasa Inggris" }
                ];
            };

            const downloadGradesFormat = () => {
                const studentsInClass = students.filter(s => s.currentClass === gradeClass && s.status === "Aktif");
                if (studentsInClass.length === 0) {
                    showToast("Tidak ada siswa aktif di kelas ini untuk dibuatkan format.", "warning");
                    return;
                }

                const subjects = getSubjectsForYear(gradeYear);
                const data = studentsInClass.map(s => {
                    const row = { "NIS": s.nis, "Nama Siswa": s.name };
                    subjects.forEach(sub => row[sub.code] = "");
                    row["Sakit"] = 0;
                    row["Izin"] = 0;
                    row["Alpa"] = 0;
                    row["Catatan Guru"] = "";
                    return row;
                });

                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Input Nilai");
                XLSX.writeFile(wb, `Format_Nilai_${gradeClass.replace(" ", "_")}_${gradeSemester}_${gradeYear.replace("/", "-")}.xlsx`);
                showToast("Format Excel berhasil diunduh!", "success");
            };

            const handleGradesImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: "binary" });
                        const sheetName = workbook.SheetNames[0];
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                        if (rows.length === 0) {
                            showToast("File Excel kosong atau format tidak sesuai.", "error");
                            return;
                        }

                        const updatedRecords = { ...academicRecords };
                        const subjects = getSubjectsForYear(gradeYear);
                        let matchCount = 0;

                        rows.forEach(row => {
                            const student = students.find(s => s.nis === String(row["NIS"] || ""));
                            if (student) {
                                const key = `${student.id}-${gradeClass}-${gradeSemester}-${gradeYear}`;
                                const gradesMap = {};
                                subjects.forEach(sub => {
                                    gradesMap[sub.code] = parseInt(row[sub.code]) || 0;
                                });

                                updatedRecords[key] = {
                                    grades: gradesMap,
                                    attendance: {
                                        sakit: parseInt(row["Sakit"]) || 0,
                                        izin: parseInt(row["Izin"]) || 0,
                                        alpa: parseInt(row["Alpa"]) || 0
                                    },
                                    note: row["Catatan Guru"] || ""
                                };
                                matchCount++;
                            }
                        });

                        setAcademicRecords(updatedRecords);
                        showToast(`Berhasil mengimpor nilai untuk ${matchCount} siswa!`, "success");
                    } catch (err) {
                        showToast("Gagal membaca file Excel. Pastikan format file sesuai.", "error");
                    }
                };
                reader.readAsBinaryString(file);
                e.target.value = ""; // Reset file input
            };

            const downloadLegerFormat = () => {
                const studentsInClass = students.filter(s => s.currentClass === gradeClass && s.status === "Aktif");
                if (studentsInClass.length === 0) {
                    showToast("Tidak ada siswa aktif di kelas ini untuk dibuatkan template Leger.", "warning");
                    return;
                }

                const subjects = getSubjectsForYear(gradeYear);
                const data = studentsInClass.map((s, idx) => {
                    const key = `${s.id}-${gradeClass}-${gradeSemester}-${gradeYear}`;
                    const rec = academicRecords[key] || { grades: {}, attendance: {} };
                    
                    const row = {
                        "No": idx + 1,
                        "NIS": s.nis,
                        "Nama Siswa": s.name
                    };

                    subjects.forEach(sub => {
                        row[sub.code] = rec.grades[sub.code] || "";
                    });

                    row["Sakit"] = rec.attendance.sakit || 0;
                    row["Izin"] = rec.attendance.izin || 0;
                    row["Alpa"] = rec.attendance.alpa || 0;
                    row["Catatan Guru"] = rec.note || "";
                    return row;
                });

                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Leger Kelas");
                XLSX.writeFile(wb, `LEGER_TEMPL_${gradeClass.replace(" ", "_")}_${gradeSemester}_${gradeYear.replace("/", "-")}.xlsx`);
                showToast("Format Leger berhasil diunduh!", "success");
            };

            const handleLegerImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = evt.target.result;
                        const workbook = XLSX.read(data, { type: "binary" });
                        const sheetName = workbook.SheetNames[0];
                        const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                        if (rows.length === 0) {
                            showToast("File Excel kosong atau rusak.", "error");
                            return;
                        }

                        const updatedRecords = { ...academicRecords };
                        const subjects = getSubjectsForYear(gradeYear);
                        let count = 0;

                        rows.forEach(row => {
                            const student = students.find(s => s.nis === String(row["NIS"] || ""));
                            if (student) {
                                const key = `${student.id}-${gradeClass}-${gradeSemester}-${gradeYear}`;
                                const gradesMap = {};
                                subjects.forEach(sub => {
                                    gradesMap[sub.code] = parseInt(row[sub.code]) || 0;
                                });

                                updatedRecords[key] = {
                                    grades: gradesMap,
                                    attendance: {
                                        sakit: parseInt(row["Sakit"]) || 0,
                                        izin: parseInt(row["Izin"]) || 0,
                                        alpa: parseInt(row["Alpa"]) || 0
                                    },
                                    note: row["Catatan Guru"] || ""
                                };
                                count++;
                            }
                        });

                        setAcademicRecords(updatedRecords);
                        showToast(`Berhasil memperbarui leger kelas untuk ${count} siswa!`, "success");

                        showToast("Gagal membaca file Leger Excel.", "error");
                    }

                reader.readAsBinaryString(file);
                e.target.value = "";

                const mutOut = students.filter(s => s.status === "Mutasi Keluar").length;
                const graduated = students.filter(s => s.status === "Lulus").length;

                    totalActive: active.length,
                    boysActive: boys,
                    girlsActive: girls,
                    totalMutationIn: mutIn,
                    totalMutationOut: mutOut,

                                        </div>
                                    </div>

                                    {/* Conditional fields based on student status */}
                                    {studentForm.status === "Mutasi Masuk" && (
                                        <div className="bg-emerald-50/40 p-4 border rounded-xl space-y-3">
                                            <p className="font-bold text-emerald-800 tracking-wider text-[10px]">Detail Mutasi Masuk</p>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                <div><label className="block font-semibold mb-1">TGL MASUK</label><input type="date" value={studentForm.mutationInDate} onChange={(e) => setStudentForm({ ...studentForm, mutationInDate: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                                <div><label className="block font-semibold mb-1">SEKOLAH ASAL</label><input type="text" placeholder="Asal sekolah..." value={studentForm.originSchool} onChange={(e) => setStudentForm({ ...studentForm, originSchool: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                                <div><label className="block font-semibold mb-1">ALAMAT ASAL</label><input type="text" placeholder="Alamat asal..." value={studentForm.originSchoolAddress} onChange={(e) => setStudentForm({ ...studentForm, originSchoolAddress: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                            </div>
                                        </div>
                                    )}

                                    {studentForm.status === "Mutasi Keluar" && (
                                        <div className="bg-amber-50/40 p-4 border rounded-xl space-y-3">
                                            <p className="font-bold text-amber-800 tracking-wider text-[10px]">Detail Mutasi Keluar</p>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                <div><label className="block font-semibold mb-1">TGL KELUAR</label><input type="date" value={studentForm.mutationOutDate} onChange={(e) => setStudentForm({ ...studentForm, mutationOutDate: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                                <div><label className="block font-semibold mb-1">SEKOLAH TUJUAN</label><input type="text" placeholder="Sekolah tujuan..." value={studentForm.targetSchool} onChange={(e) => setStudentForm({ ...studentForm, targetSchool: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                                <div><label className="block font-semibold mb-1">ALAMAT TUJUAN</label><input type="text" placeholder="Alamat tujuan..." value={studentForm.targetSchoolAddress} onChange={(e) => setStudentForm({ ...studentForm, targetSchoolAddress: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                            </div>
                                        </div>
                                    )}

                                    {studentForm.status === "Lulus" && (
                                        <div className="bg-purple-50/40 p-4 border rounded-xl space-y-3">
                                            <p className="font-bold text-purple-800 tracking-wider text-[10px]">Informasi Ijazah & Kelulusan</p>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                                <div><label className="block font-semibold mb-1">NO. IJAZAH</label><input type="text" placeholder="DN-02/D-SD/..." value={studentForm.graduationNo} onChange={(e) => setStudentForm({ ...studentForm, graduationNo: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                                <div><label className="block font-semibold mb-1">TGL KELULUSAN</label><input type="date" value={studentForm.graduationDate} onChange={(e) => setStudentForm({ ...studentForm, graduationDate: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                                <div><label className="block font-semibold mb-1">RATA-RATA NILAI</label><input type="text" placeholder="Contoh: 88.5" value={studentForm.graduationAvg} onChange={(e) => setStudentForm({ ...studentForm, graduationAvg: e.target.value })} className="w-full px-3 py-1.5 border rounded bg-white outline-none" /></div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="pt-4 border-t flex justify-end gap-2">
                                        <button type="button" onClick={() => setStudentModalOpen(false)} className="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-bold">Batal</button>
                                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold">Simpan Siswa</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render main App inside DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        window.addEventListener('load', () => lucide.createIcons());
        document.addEventListener('click', () => setTimeout(() => lucide.createIcons(), 50));
    </script>
</body>
</html>
